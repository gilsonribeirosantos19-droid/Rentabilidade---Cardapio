<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Protótipo — Sidebar estilo Conta Azul (módulos → entra → seções)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,'Segoe UI',sans-serif;background:#eef1f4;color:#1e293b;font-size:14px;display:flex;height:100vh;overflow:hidden}

  /* ───── BARRA DE MÓDULOS (cheia por padrão, encolhe ao entrar) ───── */
  .modbar{width:220px;background:#1e293b;flex-shrink:0;display:flex;flex-direction:column;padding:14px 0;transition:width .22s ease;position:relative;z-index:32;overflow-y:auto}
  .modbar::-webkit-scrollbar{width:6px}.modbar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}
  body.dived .modbar{width:52px}
  .mlogo{display:flex;align-items:center;gap:9px;padding:2px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:8px}
  .mlogo .mk{width:36px;height:36px;background:#f97316;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 2px 8px rgba(249,115,22,.35)}
  .mlogo b{font-size:18px;color:#f1f5f9;font-weight:800;line-height:1}.mlogo small{display:block;font-size:11px;color:#f97316;font-weight:600}
  body.dived .mlogo .txt{display:none}body.dived .mlogo{justify-content:center;padding:2px 0 14px}
  .mod{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:9px;margin:4px 10px;cursor:pointer;color:rgba(255,255,255,.74);position:relative}
  .mod:hover{background:rgba(255,255,255,.07);color:#fff}
  .mod.on{background:rgba(249,115,22,.16);color:#f97316}
  .mod svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.9;flex:none}
  .mod .l{font-size:13.5px;font-weight:500;white-space:nowrap}
  .mod .ch{margin-left:auto;font-size:13px;color:rgba(255,255,255,.4);font-weight:700}
  body.dived .mod{justify-content:center;padding:11px 0;margin:5px 6px;border-radius:9px}
  body.dived .mod svg{width:18px;height:18px}
  body.dived .mlogo .mk{width:32px;height:32px}
  body.dived .mod .l,body.dived .mod .ch{display:none}

  /* ───── PAINEL DE SEÇÕES (aparece ao entrar no módulo) ───── */
  .secbar{width:168px;background:#0f1a2e;flex-shrink:0;display:flex;flex-direction:column;padding:14px 0;z-index:31;overflow-y:auto;border-right:1px solid rgba(0,0,0,.25)}
  .secbar::-webkit-scrollbar{width:6px}.secbar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:4px}
  body:not(.dived) .secbar{display:none}
  .sec-back{display:flex;align-items:center;gap:9px;padding:4px 14px 13px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:8px;cursor:pointer;color:#f1f5f9}
  .sec-back:hover .bk{background:#f97316;color:#fff;border-color:#f97316}
  .bk{width:24px;height:24px;border-radius:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex:none;color:#cbd5e1}
  .sec-back b{font-size:16px;font-weight:800}
  .item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;margin:3px 9px;cursor:pointer;color:rgba(255,255,255,.72);font-size:13px;font-weight:500}
  .item:hover{background:rgba(255,255,255,.07);color:#fff}
  .item.on{background:rgba(249,115,22,.2);color:#fff;font-weight:600}
  .item .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.5;flex:none}
  /* subgrupo recolhível (estilo CADASTROS do Conta Azul) */
  .grp{margin-top:6px}
  .grp-h{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 8px;cursor:pointer;color:rgba(255,255,255,.6);font-size:12.5px;font-weight:600;letter-spacing:0;text-transform:none}
  .grp-h:hover{color:#fff}
  .grp-h svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;transition:transform .15s}
  .grp.col .grp-h svg{transform:rotate(-90deg)}
  .grp.col .grp-items{display:none}
  .grp-items{margin-left:12px;padding-left:11px;border-left:1px solid rgba(255,255,255,.1)}

  /* ───── WORKSPACE ───── */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden}
  .tb{height:58px;background:#fff;border-bottom:1px solid #e7ebf0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
  .tb-title{font-size:20px;font-weight:800;color:#0f172a}
  .tb-r{display:flex;align-items:center;gap:12px;font-size:13px;color:#475569}
  .tb-r select{height:34px;border:1px solid #d3dae3;border-radius:8px;padding:0 8px;font-family:inherit;font-size:13px}
  .ws-tabs{display:flex;align-items:flex-end;gap:3px;padding:8px 16px 0;background:#eef1f4;flex-shrink:0;overflow-x:auto}
  .ws-tab{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;font-size:13px;font-weight:600;color:#64748b;background:#e2e8f0;border:1px solid #d8dee8;border-bottom:none;border-radius:8px 8px 0 0;cursor:pointer;white-space:nowrap}
  .ws-tab.active{background:#fff;color:#0f172a;border-bottom:2px solid #f97316;margin-bottom:-1px}
  .ws-tab .x{color:#94a3b8;font-size:15px;line-height:1}
  .ws-body{flex:1;overflow-y:auto;background:#fff;padding:24px;border-top:1px solid #e7ebf0}
  .note2{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:12.5px;padding:9px 13px;border-radius:9px;margin-bottom:16px;line-height:1.5;max-width:760px}
  .scr-h{font-size:18px;font-weight:800;color:#0f172a}.scr-d{font-size:13px;color:#64748b;margin:4px 0 16px}
  .scr-tool{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .scr-tool .f{height:36px;border:1px solid #d3dae3;border-radius:8px;background:#fff;padding:0 12px;font-size:12.5px;color:#64748b;display:flex;align-items:center}
  .scr-tbl{border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;max-width:720px}
  .scr-tbl .r{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;font-size:12.5px}
  .scr-tbl .r.head{background:#f1f5f9;color:#475569;font-weight:700}
  .scr-tbl .r>div{padding:9px 12px;border-bottom:1px solid #eef1f5}
  .flash{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;font-size:12.5px;font-weight:600;padding:9px 16px;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;transition:opacity .2s;pointer-events:none;z-index:99}
  .flash.on{opacity:1}
</style>
</head>
<body>
  <nav class="modbar" id="modbar"></nav>
  <nav class="secbar" id="secbar"></nav>

  <div class="main">
    <div class="tb"><div class="tb-title" id="tbTitle">Início</div><div class="tb-r"><select><option>Todas as lojas</option></select><span>Djalma Leite Pinheiro Neto</span></div></div>
    <div class="ws-tabs" id="wsTabs"></div>
    <div class="ws-body" id="wsBody"></div>
  </div>
  <div class="flash" id="flash">⚡ aberto sem recarregar</div>

  <script>
    const I={
      home:'<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
      box:'<svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4z"/><polyline points="3.3 7 12 12 20.7 7"/></svg>',
      cart:'<svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>',
      file:'<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
      db:'<svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>',
      chart:'<svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
      chef:'<svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>',
      gear:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>'
    };
    const chev='<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>';

    // Início = atalho direto; demais módulos "entram" mostrando seções
    const MODULES = [
      {n:'Início', ic:I.home, home:true},
      {n:'Estoque', ic:I.box, sec:[
        {n:'Visão Geral', go:'__home'},
        {grp:'Lançamentos', items:['Entradas','Saídas','Inventário']},
        {grp:'Consultas', items:['Saldo de Estoque','Movimentação','Kardex']},
        {grp:'Relatórios', items:['Histórico de Entradas','Consumo de Insumos','Histórico de Custos']},
        {grp:'Análises', items:['Curva ABC','Inflação','Resumo']},
        {n:'Fechamento', go:'Fechamento'},
        {n:'Ajustes', go:'Ajustes'}
      ]},
      {n:'Compras', ic:I.cart, sec:[{n:'Sugestão de Compras',go:'Sugestão de Compras'},{n:'Pedidos de Compra',go:'Pedidos de Compra'}]},
      {n:'Fiscal', ic:I.file, sec:[{n:'Monitor NF-e',go:'Monitor NF-e'},{n:'Entradas Processadas',go:'Entradas Processadas'},{n:'Auditoria de Conversão',go:'Auditoria de Conversão'}]},
      {n:'Cadastros', ic:I.db, sec:[{n:'Insumos',go:'Insumos'},{n:'Produtos',go:'Produtos'},{n:'Fichas Técnicas',go:'Fichas Técnicas'},{n:'Fornecedores',go:'Fornecedores'}]},
      {n:'Gestão', ic:I.chart, sec:[{n:'CMV Teórico × Real',go:'CMV'},{n:'Rendimentos',go:'Rendimentos'},{n:'Divergências',go:'Divergências'},{n:'Fechamento de Custo',go:'Fechamento de Custo'}]},
      {n:'PDV', ic:I.cart, sec:[{n:'Dashboard',go:'PDV Dashboard'},{n:'Relatórios',go:'PDV Relatórios'},{n:'Importar / API',go:'Importar / API'}]},
      {n:'Produção', ic:I.chef, sec:[{n:'Produção',go:'Produção'},{n:'Porcionamento',go:'Porcionamento'}]},
      {n:'Config', ic:I.gear, sec:[{n:'Geral',go:'Geral'},{n:'Usuários',go:'Usuários'},{n:'Permissões',go:'Permissões'},{n:'Parâmetros',go:'Parâmetros'}]}
    ];

    let activeMod=null, openTabs=[], active='__home';

    function renderMods(){
      document.getElementById('modbar').innerHTML =
        `<div class="mlogo"><div class="mk"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"><polyline points="1,21 8,6 13,13 17,8 23,21"/><line x1="1" y1="21" x2="23" y2="21"/></svg></div><div class="txt"><b>Aiko</b><small>sistema</small></div></div>`+
        MODULES.map(m=>`<div class="mod${m.n===activeMod?' on':''}" onclick="modClick('${m.n}')">${m.ic}<span class="l">${m.n}</span>${m.sec?'<span class="ch">›</span>':''}</div>`).join('');
    }
    function modClick(n){
      const m=MODULES.find(x=>x.n===n);
      if(m.home){ activeMod=null; document.body.classList.remove('dived'); document.getElementById('tbTitle').textContent='Início'; renderMods(); goHome(); return; }
      activeMod=n; document.body.classList.add('dived'); document.getElementById('tbTitle').textContent=n;
      renderMods(); renderSecs();
    }
    function back(){ activeMod=null; document.body.classList.remove('dived'); renderMods(); }

    function renderSecs(){
      const m=MODULES.find(x=>x.n===activeMod);
      let html=`<div class="sec-back" onclick="back()"><span class="bk">‹</span><b>${m.n}</b></div>`;
      m.sec.forEach((s,idx)=>{
        if(s.grp){
          html+=`<div class="grp col" id="g${idx}"><div class="grp-h" onclick="document.getElementById('g${idx}').classList.toggle('col')"><span>${s.grp}</span>${chev}</div><div class="grp-items">`+
            s.items.map(i=>`<div class="item" data-s="${i}" onclick="openScreen('${i}')"><span class="dot"></span>${i}</div>`).join('')+`</div></div>`;
        } else {
          html+=`<div class="item" data-s="${s.n}" onclick="${s.go==='__home'?'goHome()':`openScreen('${s.go}')`}"><span class="dot"></span>${s.n}</div>`;
        }
      });
      document.getElementById('secbar').innerHTML=html;
    }

    function flash(){ const f=document.getElementById('flash'); f.classList.add('on'); clearTimeout(window._ft); window._ft=setTimeout(()=>f.classList.remove('on'),1100); }
    function openScreen(label){ const isNew=!openTabs.find(t=>t.key===label); if(isNew) openTabs.push({key:label,label}); active=label; if(isNew) flash(); render(); }
    function closeTab(key,ev){ ev.stopPropagation(); openTabs=openTabs.filter(t=>t.key!==key); if(active===key) active=openTabs.length?openTabs[openTabs.length-1].key:'__home'; render(); }
    function goHome(){ active='__home'; render(); }
    function render(){
      document.querySelectorAll('.item').forEach(e=>e.classList.toggle('on', e.dataset.s===active));
      let h=`<div class="ws-tab home${active==='__home'?' active':''}" onclick="goHome()" title="Início">🏠</div>`;
      h+=openTabs.map(t=>`<div class="ws-tab${active===t.key?' active':''}" onclick="openScreen('${t.label}')">${t.label} <span class="x" onclick="closeTab('${t.key}',event)">×</span></div>`).join('');
      document.getElementById('wsTabs').innerHTML=h;
      const b=document.getElementById('wsBody');
      if(active==='__home'){ b.innerHTML=`<div class="note2">🧭 <b>Estilo Conta Azul:</b> a barra começa <b>cheia</b> (módulos). Clique num módulo (ex.: <b>Estoque</b>) → ela <b>encolhe pra ícones</b> e abre o painel de <b>seções</b>, com a seta <b>‹</b> pra <b>voltar/expandir</b>. Troque de módulo pelos ícones sem voltar.</div><div class="scr-h">${activeMod||'Início'} · visão geral</div><div class="scr-d">Selecione uma seção.</div>`; return; }
      b.innerHTML=`<div class="scr-h">${active}</div><div class="scr-d">Tela de exemplo — abriu como aba, sem recarregar.</div>
        <div class="scr-tool"><div class="f">Período: Mês atual</div><div class="f">Loja: Todas</div><div class="f">🔍 Buscar…</div></div>
        <div class="scr-tbl"><div class="r head"><div>Insumo</div><div>Un.</div><div>Qtd</div><div>Valor</div></div>
          <div class="r"><div>Salmão Fresco</div><div>kg</div><div>12,500</div><div>R$ 1.250,00</div></div>
          <div class="r"><div>Arroz Japonês</div><div>kg</div><div>30,000</div><div>R$ 210,00</div></div>
          <div class="r"><div>Cream Cheese</div><div>kg</div><div>8,200</div><div>R$ 410,00</div></div>
        </div>`;
    }
    renderMods(); render();
  </script>
</body>
</html>
