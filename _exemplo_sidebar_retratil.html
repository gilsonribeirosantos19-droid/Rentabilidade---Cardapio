<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Protótipo — Menu ícone+rótulo (estilo 2ª foto, grande) + flyout</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,'Segoe UI',sans-serif;background:#eef1f4;color:#1e293b;font-size:14px;display:flex;height:100vh;overflow:hidden}

  /* ───── MENU (ícone em cima, rótulo embaixo — estilo da 2ª foto, GRANDE) ───── */
  .rail{width:124px;background:#1e293b;flex-shrink:0;display:flex;flex-direction:column;padding:16px 0;position:relative;z-index:30;overflow-y:auto}
  .rail::-webkit-scrollbar{width:6px}.rail::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}
  .rl-logo{display:flex;justify-content:center;margin-bottom:16px}
  .rl-logo .mk{width:46px;height:46px;background:#f97316;border-radius:13px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(249,115,22,.4)}

  .rl-it{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 6px;border-radius:15px;margin:3px 12px;cursor:pointer;color:rgba(255,255,255,.74);position:relative;transition:background .12s}
  .rl-it:hover{background:rgba(255,255,255,.08);color:#fff}
  .rl-it.on{background:#fff;color:#1e293b}
  .rl-it svg{width:27px;height:27px;stroke:currentColor;fill:none;stroke-width:1.8}
  .rl-it .lab{font-size:12.5px;font-weight:600;text-align:center;line-height:1.15}
  .rl-it .ch{position:absolute;right:7px;top:16px;font-size:14px;color:#f97316;font-weight:800}
  .rl-it.on .ch{color:#f97316}

  .collapse{position:absolute;right:-13px;top:90px;width:26px;height:26px;border-radius:50%;background:#cbd5e1;border:3px solid #eef1f4;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#334155;font-size:13px;font-weight:800;z-index:40}
  .collapse:hover{background:#f97316;color:#fff}

  /* ───── FLYOUT (abre ao lado do item) ───── */
  .fly{position:fixed;width:250px;background:#1f2937;border-radius:13px;box-shadow:0 16px 46px rgba(0,0,0,.42);padding:15px;opacity:0;transform:translateX(-8px);pointer-events:none;transition:opacity .15s, transform .15s;z-index:60}
  .fly.open{opacity:1;transform:translateX(0);pointer-events:auto}
  .fly-head{display:flex;gap:12px;align-items:flex-start;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:9px}
  .fly-ic{width:44px;height:44px;border-radius:12px;background:#f97316;display:flex;align-items:center;justify-content:center;flex:none}
  .fly-ic svg{width:23px;height:23px;stroke:#fff;fill:none;stroke-width:2}
  .fly-t{font-size:15.5px;font-weight:800;color:#fff}
  .fly-d{font-size:12px;color:#94a3b8;margin-top:3px;line-height:1.4}
  .fly-i{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;border-radius:10px;cursor:pointer;color:#cbd5e1;font-size:13.5px;font-weight:500}
  .fly-i:hover{background:rgba(249,115,22,.15);color:#f97316}
  .fly-i .ar{color:#64748b;font-size:13px}

  /* ───── WORKSPACE ───── */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden}
  .tb{height:58px;background:#fff;border-bottom:1px solid #e7ebf0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
  .tb-title{font-size:20px;font-weight:800;color:#0f172a}
  .tb-r{display:flex;align-items:center;gap:12px;font-size:13px;color:#475569}
  .tb-r select{height:34px;border:1px solid #d3dae3;border-radius:8px;padding:0 8px;font-family:inherit;font-size:13px}
  .ws-tabs{display:flex;align-items:flex-end;gap:3px;padding:8px 16px 0;background:#eef1f4;flex-shrink:0;overflow-x:auto}
  .ws-tab{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;font-size:13px;font-weight:600;color:#64748b;background:#e2e8f0;border:1px solid #d8dee8;border-bottom:none;border-radius:8px 8px 0 0;cursor:pointer;white-space:nowrap}
  .ws-tab.active{background:#fff;color:#0f172a;border-bottom:2px solid #f97316;margin-bottom:-1px}
  .ws-tab .x{color:#94a3b8;font-size:15px;line-height:1}
  .ws-body{flex:1;overflow-y:auto;background:#fff;padding:24px;border-top:1px solid #e7ebf0}
  .note2{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:12.5px;padding:9px 13px;border-radius:9px;margin-bottom:16px;line-height:1.5;max-width:760px}
  .scr-h{font-size:18px;font-weight:800;color:#0f172a}.scr-d{font-size:13px;color:#64748b;margin:4px 0 16px}
  .scr-tool{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .scr-tool .f{height:36px;border:1px solid #d3dae3;border-radius:8px;background:#fff;padding:0 12px;font-size:12.5px;color:#64748b;display:flex;align-items:center}
  .scr-tbl{border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;max-width:720px}
  .scr-tbl .r{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;font-size:12.5px}
  .scr-tbl .r.head{background:#f1f5f9;color:#475569;font-weight:700}
  .scr-tbl .r>div{padding:9px 12px;border-bottom:1px solid #eef1f5}
  .flash{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;font-size:12.5px;font-weight:600;padding:9px 16px;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;transition:opacity .2s;pointer-events:none;z-index:99}
  .flash.on{opacity:1}
</style>
</head>
<body>
  <nav class="rail" id="rail">
    <div class="rl-logo"><div class="mk"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"><polyline points="1,21 8,6 13,13 17,8 23,21"/><line x1="1" y1="21" x2="23" y2="21"/></svg></div></div>
    <div id="navItems"></div>
    <div class="collapse" id="cbtn" onclick="toggleMini()" title="Retrair / expandir">‹</div>
  </nav>

  <div class="fly" id="fly"></div>

  <div class="main">
    <div class="tb"><div class="tb-title">Estoque</div><div class="tb-r"><select><option>Todas as lojas</option></select><span>Djalma Leite Pinheiro Neto</span></div></div>
    <div class="ws-tabs" id="wsTabs"></div>
    <div class="ws-body" id="wsBody"></div>
  </div>
  <div class="flash" id="flash">⚡ aberto sem recarregar</div>

  <script>
    const ICON = {
      'Início':'<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
      'Lançamentos':'<svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4z"/><polyline points="3.3 7 12 12 20.7 7"/><line x1="12" y1="22" x2="12" y2="12"/></svg>',
      'Consultas':'<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
      'Relatórios':'<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
      'Análises':'<svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
      'Fechamento':'<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M9 16l2 2 4-4"/></svg>',
      'Configuração':'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>'
    };
    const ORDER = ['Início','Lançamentos','Consultas','Relatórios','Análises','Fechamento','Configuração'];
    const MENU = {
      'Lançamentos':{desc:'Registre entradas, saídas e movimentações de estoque.', items:['Entradas','Saídas','Inventário']},
      'Consultas':{desc:'Consulte posição, movimento e histórico do estoque.', items:['Saldo de Estoque','Movimentação','Kardex']},
      'Relatórios':{desc:'Extratos e listagens de estoque por período.', items:['Histórico de Entradas','Consumo de Insumos','Histórico de Custos']},
      'Análises':{desc:'Análises estratégicas para apoiar a decisão.', items:['Curva ABC','Inflação','Resumo']},
      'Configuração':{desc:'Parâmetros e ajustes do módulo.', items:['Parâmetros','Ajustes']}
    };
    const SCREENS = {
      'Saldo de Estoque':'Saldo atual, custo médio e valor financeiro por loja.','Movimentação':'Histórico de entradas, saídas e consumo no período.','Kardex':'Rastreabilidade e saldo de um insumo ao longo do tempo.','Entradas':'Registre entradas de insumos no estoque.','Saídas':'Registre saídas e consumo de insumos.','Inventário':'Contagem e conferência física do estoque.','Histórico de Entradas':'Extrato de entradas por período.','Consumo de Insumos':'Consumo (saídas) mês a mês por insumo.','Histórico de Custos':'Auditoria das variações de custo médio.','Curva ABC':'Classificação dos itens por relevância de valor.','Inflação':'Variação de custo dos insumos no tempo.','Resumo':'Visão geral consolidada do estoque.','Fechamento':'Consolidação periódica do estoque.','Parâmetros':'Parâmetros do módulo de estoque.','Ajustes':'Ajuste de estoque, custo médio e recálculo.'
    };

    const nav=document.getElementById('navItems');
    nav.innerHTML = ORDER.map(m=>{
      const hasSub=!!MENU[m];
      return `<div class="rl-it" data-m="${m}" onclick="railClick('${m}',this)">${ICON[m]}<span class="lab">${m}</span>${hasSub?'<span class="ch">›</span>':''}</div>`;
    }).join('');

    const fly=document.getElementById('fly');
    let flyOpen=null, openTabs=[], active='__home';

    function railClick(m, el){
      if(MENU[m]){ openFly(m, el); }
      else { closeFly(); markRail(m); if(m==='Início') goHome(); else openScreen(m); }
    }
    function openFly(name, el){
      if(flyOpen===name){ closeFly(); return; }
      flyOpen=name; const mn=MENU[name];
      fly.innerHTML = `<div class="fly-head"><div class="fly-ic">${ICON[name]}</div><div><div class="fly-t">${name}</div><div class="fly-d">${mn.desc}</div></div></div>`+
        mn.items.map(i=>`<div class="fly-i" onclick="pick(event,'${i}')"><span>${i}</span><span class="ar">›</span></div>`).join('');
      const r=el.getBoundingClientRect();
      let top=r.top; const h=70+mn.items.length*44; if(top+h>window.innerHeight-12) top=window.innerHeight-h-12;
      fly.style.top=Math.max(12,top)+'px'; fly.style.left=(r.right+10)+'px';
      fly.classList.add('open'); markRail(name);
    }
    function closeFly(){ flyOpen=null; fly.classList.remove('open'); }
    function pick(ev,item){ if(ev) ev.stopPropagation(); closeFly(); openScreen(item); }
    function markRail(name){ document.querySelectorAll('.rl-it').forEach(el=>el.classList.toggle('on', el.dataset.m===name)); }
    function toggleMini(){ document.body.classList.toggle('mini'); document.getElementById('cbtn').textContent=document.body.classList.contains('mini')?'›':'‹'; closeFly(); }
    document.addEventListener('click', e=>{ if(!e.target.closest('.rail') && !e.target.closest('.fly')) closeFly(); });

    function flash(){ const f=document.getElementById('flash'); f.classList.add('on'); clearTimeout(window._ft); window._ft=setTimeout(()=>f.classList.remove('on'),1100); }
    function openScreen(label){ const isNew=!openTabs.find(t=>t.key===label); if(isNew) openTabs.push({key:label,label}); active=label; if(isNew) flash(); render(); }
    function closeTab(key,ev){ ev.stopPropagation(); openTabs=openTabs.filter(t=>t.key!==key); if(active===key) active=openTabs.length?openTabs[openTabs.length-1].key:'__home'; render(); }
    function goHome(){ active='__home'; render(); }
    function render(){
      let h=`<div class="ws-tab home${active==='__home'?' active':''}" onclick="goHome()" title="Início">🏠</div>`;
      h+=openTabs.map(t=>`<div class="ws-tab${active===t.key?' active':''}" onclick="openScreen('${t.label}')">${t.label} <span class="x" onclick="closeTab('${t.key}',event)">×</span></div>`).join('');
      document.getElementById('wsTabs').innerHTML=h;
      const b=document.getElementById('wsBody');
      if(active==='__home'){ b.innerHTML=`<div class="note2">👈 Menu no estilo da 2ª foto (ícone + rótulo, maior). Clique em <b>Lançamentos</b> — abre o card <b>ao lado</b> (sem repetir o título de forma redundante). A bolinha <b>‹</b> retrai pra só ícones.</div><div class="scr-h">Estoque · visão geral</div><div class="scr-d">Selecione um item no menu para abrir como aba.</div>`; return; }
      b.innerHTML=`<div class="scr-h">${active}</div><div class="scr-d">${SCREENS[active]||''}</div>
        <div class="scr-tool"><div class="f">Período: Mês atual</div><div class="f">Loja: Todas</div><div class="f">🔍 Buscar…</div></div>
        <div class="scr-tbl"><div class="r head"><div>Insumo</div><div>Un.</div><div>Qtd</div><div>Valor</div></div>
          <div class="r"><div>Salmão Fresco</div><div>kg</div><div>12,500</div><div>R$ 1.250,00</div></div>
          <div class="r"><div>Arroz Japonês</div><div>kg</div><div>30,000</div><div>R$ 210,00</div></div>
          <div class="r"><div>Cream Cheese</div><div>kg</div><div>8,200</div><div>R$ 410,00</div></div>
        </div>`;
    }
    render();
  </script>
</body>
</html>
