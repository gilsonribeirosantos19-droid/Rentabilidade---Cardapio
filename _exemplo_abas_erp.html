<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protótipo · Abas ERP (SAP/TOTVS/Everest)</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --orange:#f97316; --text1:#0f172a; --text2:#64748b; --text3:#94a3b8;
    --border:#e2e8f0; --nav:#0f1a2e; --canvas:#f4f6fa;
    --tabband:#e6ebf2; --tabdiv:#d3dae3;
  }
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#eef2f7;color:var(--text1);height:100vh;display:flex;overflow:hidden}

  .rail{width:52px;background:var(--nav);flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:6px}
  .rail .mk{width:32px;height:32px;background:var(--orange);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;margin-bottom:10px}
  .rail .ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.55);font-size:16px}
  .rail .ic.on{background:rgba(249,115,22,.16);color:var(--orange)}

  .main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden}
  .topbar{height:44px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0}
  .crumb{display:flex;align-items:baseline;gap:8px;font-weight:800}
  .crumb .c1{font-size:15px;color:var(--text3)} .crumb .sep{color:var(--text3)} .crumb .c2{font-size:16px;color:var(--text1)}
  .tr{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text2)}
  .tr select{height:32px;border:1px solid var(--border);border-radius:8px;padding:0 8px;font-family:inherit;font-size:13px}
  .tr .sair{color:#e11d48;border:1px solid #fecaca;background:#fff;border-radius:7px;height:30px;padding:0 12px;font-weight:600;cursor:pointer}

  /* ===== ABAS ERP (retangulares, sóbrias) ===== */
  .erp-tabs{display:flex;align-items:stretch;background:var(--tabband);border-bottom:1px solid var(--tabdiv);padding:0;flex-shrink:0;overflow-x:auto;height:36px}
  .erp-tab{display:inline-flex;align-items:center;gap:8px;padding:0 15px;font-size:12.5px;font-weight:600;color:#5b6b85;background:transparent;border-right:1px solid var(--tabdiv);cursor:pointer;white-space:nowrap;position:relative}
  .erp-tab .ico{font-size:13px;opacity:.7}
  .erp-tab .x{color:#adb6c7;font-size:15px;line-height:1;margin-left:2px;padding:0 3px;border-radius:5px}
  .erp-tab .x:hover{background:#fddede;color:#e11d48}
  .erp-tab:hover{color:#0f172a;background:rgba(255,255,255,.5)}
  .erp-tab.on{color:#0f172a;background:var(--canvas);font-weight:700}
  .erp-tab.on .ico{opacity:1;color:var(--orange)}

  /* acabamento A: acento EM CIMA (TOTVS/Everest) */
  body.top .erp-tab.on{margin-bottom:-1px;border-bottom:1px solid var(--canvas)}
  body.top .erp-tab.on::before{content:'';position:absolute;top:0;left:-1px;right:-1px;height:2.5px;background:var(--orange)}

  /* acabamento B: SUBLINHADO embaixo (SAP Fiori) */
  body.under .erp-tabs{background:#fff;border-bottom:1px solid var(--border)}
  body.under .erp-tab{border-right:none}
  body.under .erp-tab.on{background:#fff}
  body.under .erp-tab.on::after{content:'';position:absolute;bottom:0;left:8px;right:8px;height:2.5px;background:var(--orange);border-radius:2px}

  .content{flex:1;overflow-y:auto;background:var(--canvas);padding:16px 20px}
  .card{background:#fff;border:1px solid #e7ebf0;border-radius:12px;box-shadow:0 1px 3px rgba(15,23,42,.06)}
  .filterbar{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;padding:10px 14px;margin-bottom:14px}
  .fg{display:flex;flex-direction:column;gap:3px}
  .fg label{font-size:11px;font-weight:500;color:var(--text2)}
  .fg .field{height:34px;border:1px solid #cbd5e1;border-radius:8px;padding:0 10px;font-size:13px;font-family:inherit;background:#fff}
  .fg.grow{flex:1;min-width:220px}.fg.grow .field{width:100%}
  .btn-ghost{height:34px;padding:0 12px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-left:auto}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  thead th{background:#f1f5f9;color:var(--text2);font-weight:700;text-transform:uppercase;font-size:10.5px;text-align:left;padding:8px 12px;border-bottom:1px solid var(--border)}
  th.r,td.r{text-align:right}
  tbody td{padding:6px 12px;border-bottom:1px solid #eef1f5}
  tbody tr:last-child td{border-bottom:none}
  .mono{font-family:'DM Mono',monospace} .mut{color:var(--text2)} .ok{color:#16a34a;font-weight:700;font-size:11px}

  .demo{position:fixed;right:16px;bottom:16px;background:#0f172a;color:#fff;border-radius:12px;padding:12px 16px;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:99;font-size:13px;display:flex;align-items:center;gap:12px}
  .demo b{font-weight:700}.demo .hint{color:#94a3b8;font-size:11px}
  .demo button{background:var(--orange);border:none;color:#fff;font-weight:700;padding:7px 12px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px}
</style>
</head>
<body class="top">
<div class="rail">
  <div class="mk">A</div><div class="ic">🏠</div><div class="ic on">📦</div><div class="ic">🛒</div><div class="ic">🧾</div><div class="ic">🗄️</div>
</div>

<div class="main">
  <div class="topbar">
    <div class="crumb"><span class="c1">Estoque</span><span class="sep">›</span><span class="c2">Saldo de Estoque</span></div>
    <div class="tr">
      <select><option>Todas as lojas</option></select>
      <span>Djalma Leite Pinheiro Neto</span>
      <button class="sair">⎋ Sair</button>
    </div>
  </div>

  <!-- ABAS ERP -->
  <div class="erp-tabs" id="tabs">
    <div class="erp-tab"><span class="ico">🏠</span></div>
    <div class="erp-tab"><span class="ico">📊</span>Movimentação <span class="x">×</span></div>
    <div class="erp-tab"><span class="ico">📤</span>Saídas <span class="x">×</span></div>
    <div class="erp-tab on"><span class="ico">📦</span>Saldo de Estoque <span class="x">×</span></div>
    <div class="erp-tab"><span class="ico">📋</span>Inventário <span class="x">×</span></div>
    <div class="erp-tab"><span class="ico">📇</span>Kardex <span class="x">×</span></div>
  </div>

  <div class="content">
    <div class="card filterbar">
      <div class="fg"><label>Posição</label><select class="field" style="min-width:150px"><option>Posição Atual</option></select></div>
      <div class="fg"><label>Categoria</label><select class="field" style="min-width:170px"><option>Todas as categorias</option></select></div>
      <div class="fg grow"><label>Buscar</label><input class="field" placeholder="Pesquisar item..."></div>
      <button class="btn-ghost">▽ Mais filtros</button>
    </div>
    <div class="card" style="overflow:hidden">
      <table>
        <thead><tr><th>INSUMO</th><th>CATEGORIA</th><th>LOJA</th><th class="r">SALDO</th><th class="r">CUSTO MÉDIO</th><th class="r">VALOR</th><th>STATUS</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="demo">
  <div><b>Abas ERP</b><br><span class="hint" id="lbl">Acabamento: acento em cima (TOTVS/Everest)</span></div>
  <button id="toggle">Ver sublinhado (SAP)</button>
</div>

<script>
  // troca de aba ativa (clicando)
  document.getElementById('tabs').addEventListener('click', (e)=>{
    if(e.target.classList.contains('x')) return;
    const t = e.target.closest('.erp-tab'); if(!t) return;
    document.querySelectorAll('.erp-tab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
  });

  const btn=document.getElementById('toggle'), lbl=document.getElementById('lbl');
  btn.onclick=()=>{
    if(document.body.classList.contains('top')){
      document.body.classList.replace('top','under');
      btn.textContent='Ver acento em cima (TOTVS)'; lbl.textContent='Acabamento: sublinhado (SAP Fiori)';
    } else {
      document.body.classList.replace('under','top');
      btn.textContent='Ver sublinhado (SAP)'; lbl.textContent='Acabamento: acento em cima (TOTVS/Everest)';
    }
  };

  document.getElementById('rows').innerHTML = [
    ['Salmao','Proteinas','Delivery','1.248,570','R$ 59,95','R$ 74.846,18'],
    ['Salmao','Proteinas','Cidade Nova','1.233,200','R$ 59,96','R$ 73.942,44'],
    ['Bomba Tare','Orientais','Ponta Negra','7.480,000','R$ 2,96','R$ 22.132,00'],
    ['Cream Cheese','Frios','Delivery','294,000','R$ 42,89','R$ 12.609,44'],
    ['Arroz Japones','Orientais','Cidade Nova','1.090,000','R$ 11,35','R$ 12.366,20'],
    ['Alga (Nori)','Orientais','Cidade Nova','13.250,000','R$ 0,85','R$ 11.253,50'],
  ].map(d=>`<tr><td style="font-weight:600">${d[0]}</td><td class="mut">${d[1]}</td><td class="mut">${d[2]}</td><td class="r mono">${d[3]}</td><td class="r mono">${d[4]}</td><td class="r mono" style="font-weight:700">${d[5]}</td><td><span class="ok">OK</span></td></tr>`).join('');
</script>
</body>
</html>
