<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="design-system.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entradas Processadas · Aiko</title>
<style>
  :root{--bg1:#ffffff;--bg2:#ffffff;--bg3:#f1f5f9;--border1:#e2e8f0;--text1:#0f172a;--text2:#64748b;--text3:#94a3b8;--radius:10px;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg3);color:var(--text1);min-height:100vh;display:flex;font-size:13px}
  .shell{display:flex;width:100%;min-height:100vh}
  .sidebar{width:220px;min-height:100vh;background:#ffffff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;padding:20px 0;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:hidden}
  .logo{padding:0 18px 20px;border-bottom:1px solid #e2e8f0;margin-bottom:16px}
  .logo-mark{font-size:15px;font-weight:700;color:#0f172a}
  .logo-sub{font-size:11px;color:#f97316;font-family:'DM Mono',monospace;margin-top:1px}
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{border-bottom:1px solid #e2e8f0;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fff;position:sticky;top:0;z-index:60}
  .topbar-title{font-size:20px;font-weight:700;color:#0f172a;line-height:1}
  .topbar-breadcrumb{font-size:12px;color:#94a3b8;margin-top:3px}
  .topbar-breadcrumb span{color:#f97316;font-weight:500}
  .content{padding:20px 24px;flex:1}
  .field{background:#f8fafc;border:1.5px solid #e2e8f0;color:#0f172a;padding:8px 12px;border-radius:10px;font-size:13px;outline:none;font-family:inherit;transition:all .18s}
  .field:focus{border-color:#f97316;background:#fff}
  .field-sm{padding:6px 10px;font-size:12px}
  .btn{padding:8px 16px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;color:#0f172a;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{background:#f8fafc}
  .btn-ghost{background:transparent;border:none;color:#64748b;padding:5px 8px}
  .btn-ghost:hover{background:#f1f5f9}
  .tbl-wrap{background:var(--bg2);border:1px solid var(--border1);border-radius:var(--radius);overflow:clip;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .tbl-scroll{overflow-x:auto;max-height:calc(100vh - 220px);overflow-y:auto}
  table.tbl{width:100%;border-collapse:collapse;font-size:12px}
  table.tbl thead tr{background:#0f2d5c}
  table.tbl thead th{position:sticky;top:0;z-index:5;background:#0f2d5c}
  table.tbl th{padding:7px 10px;text-align:left;font-size:10px;font-weight:600;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
  table.tbl th.r,table.tbl td.r{text-align:right}
  table.tbl th.c,table.tbl td.c{text-align:center}
  table.tbl td{padding:8px 10px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
  table.tbl tbody tr{cursor:pointer;transition:background .1s}
  table.tbl tbody tr:hover{background:#fafbfc}
  table.tbl tbody tr:last-child td{border-bottom:none}
  .empty{padding:32px;text-align:center;color:#94a3b8;font-size:13px}
  .badge-proc{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;background:#f0fdf4;color:#166534}
  #toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
  .toast-item{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:toastIn .2s ease}
  .toast-ok{background:#16a34a}.toast-err{background:#dc2626}
  @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .kpi-row{display:flex;gap:12px;margin-bottom:16px}
  .kpi{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 18px;flex:1}
  .kpi-label{font-size:11px;color:#94a3b8;margin-bottom:4px}
  .kpi-value{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;color:#0f172a}
  .kpi-value.green{color:#16a34a}
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar"><div class="logo"><div style="display:flex;align-items:center;gap:8px"><div style="width:34px;height:34px;background:#f97316;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.95)" stroke-width="1.8"><polyline points="1,21 8,6 13,13 17,8 23,21"/><line x1="1" y1="21" x2="23" y2="21"/></svg></div><div><div class="logo-mark">Aiko</div><div class="logo-sub">sistema</div></div></div></div></nav>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">Entradas Processadas</div>
        <div class="topbar-breadcrumb">Fiscal › <span>Histórico de NF-e processadas</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="last-sync" style="font-size:11px;color:#94a3b8"></span>
        <button class="btn" onclick="loadAll()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Atualizar
        </button>
      </div>
    </div>

    <div class="content">

      <!-- FILTROS -->
      <div class="filter-bar-wrap" style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <div style="position:relative">
          <input class="field field-sm" id="search-forn" placeholder="Fornecedor…" oninput="renderTable()" style="padding-left:30px;min-width:180px">
          <svg style="position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <input class="field field-sm" id="search-numero" placeholder="Nº NF-e…" oninput="renderTable()" style="width:100px">
        <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
          <select class="field field-sm" id="fil-periodo" onchange="setPeriodoRange(this.value,'fil-de','fil-ate',loadAll)" style="min-width:130px">
            <option value="todos" selected>Todos</option>
            <option value="mes_atual">Mês Atual</option>
            <option value="mes_anterior">Mês Anterior</option>
            <option value="periodo">Período</option>
          </select>
          <div style="display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:5px 10px">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <input type="date" id="fil-de" class="field field-sm" onchange="loadAll()" style="border:none;padding:0;background:transparent;width:110px">
            <span style="color:#94a3b8">–</span>
            <input type="date" id="fil-ate" class="field field-sm" onchange="loadAll()" style="border:none;padding:0;background:transparent;width:110px">
          </div>
        </div>
      </div>

      <!-- KPIs -->
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-label">NF-e processadas</div><div class="kpi-value" id="kpi-total">—</div></div>
        <div class="kpi"><div class="kpi-label">Total de itens</div><div class="kpi-value" id="kpi-itens">—</div></div>
        <div class="kpi"><div class="kpi-label">Última processada</div><div class="kpi-value" style="font-size:13px" id="kpi-ultima">—</div></div>
        <div class="kpi"><div class="kpi-label">Valor total</div><div class="kpi-value green" id="kpi-valor">—</div></div>
      </div>

      <!-- TABELA -->
      <div class="tbl-wrap"><div class="tbl-scroll">
        <table class="tbl">
          <thead><tr>
            <th>NF-e</th>
            <th>D. Emissão</th>
            <th>D. Processamento</th>
            <th>Fornecedor</th>
            <th class="r">V. Total</th>
            <th class="c">Status</th>
          </tr></thead>
          <tbody id="tbody-main">
            <tr><td colspan="6" class="empty">Carregando…</td></tr>
          </tbody>
        </table>
      </div></div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script src="utils.js"></script>
<script src="sidebar.js"></script>
<script>
'use strict';

const SUPA_URL  = 'https://trczpnjidqfippbfxtpe.supabase.co';
const SUPA_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyY3pwbmppZHFmaXBwYmZ4dHBlIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Nzc3OTIxMSwiZXhwIjoyMDkzMzU1MjExfQ.jzKBKgFu7qMyM-LAICYeThLcUkBnTfxe9xrr_79Je7g';
const TENANT_ID = localStorage.getItem('sb_tenant_id') || '00000000-0000-0000-0000-000000000001';
const api = createApi(SUPA_URL, SUPA_KEY);

let allData = [];

function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function brl(v) { if(v==null||v==='') return '—'; return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(iso) { if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function fmtDateShort(iso) { if(!iso) return '—'; return new Date(iso).toLocaleDateString('pt-BR'); }

function setPeriodoRange(tipo, deId, ateId, fn) {
  const d=new Date(); let de='', ate='';
  if(tipo==='todos') {
    const elD=document.getElementById(deId); if(elD) elD.value='';
    const elA=document.getElementById(ateId); if(elA) elA.value='';
    if(fn) fn(); return;
  } else if(tipo==='mes_atual'){
    de=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
    ate=d.toISOString().split('T')[0];
  } else if(tipo==='mes_anterior'){
    const p=new Date(d.getFullYear(),d.getMonth()-1,1);
    const l=new Date(d.getFullYear(),d.getMonth(),0);
    de=`${p.getFullYear()}-${String(p.getMonth()+1).padStart(2,'0')}-01`;
    ate=`${l.getFullYear()}-${String(l.getMonth()+1).padStart(2,'0')}-${String(l.getDate()).padStart(2,'0')}`;
  } else { return; }
  const elD=document.getElementById(deId); if(elD) elD.value=de;
  const elA=document.getElementById(ateId); if(elA) elA.value=ate;
  if(fn) fn();
}

async function loadAll() {
  const periodo = document.getElementById('fil-periodo')?.value || 'todos';
  const de  = document.getElementById('fil-de')?.value;
  const ate = document.getElementById('fil-ate')?.value;
  let dateFilter = '';
  if(periodo !== 'todos') {
    if(de)  dateFilter += `&processada_em=gte.${de}T00:00:00`;
    if(ate) dateFilter += `&processada_em=lte.${ate}T23:59:59`;
  }

  try {
    const data = await api(`nfe_recebidas?tenant_id=eq.${TENANT_ID}&status=eq.processada&order=processada_em.desc${dateFilter}&select=*`);
    allData = data || [];
    renderKpis();
    renderTable();
    document.getElementById('last-sync').textContent = 'Atualizado ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    toast('Erro ao carregar: ' + e.message, 'err');
  }
}

function renderKpis() {
  const total = allData.reduce((s,n) => s + (Number(n.valor_total)||0), 0);
  document.getElementById('kpi-total').textContent  = allData.length;
  document.getElementById('kpi-itens').textContent  = '—';
  document.getElementById('kpi-ultima').textContent = allData[0] ? fmtDateShort(allData[0].processada_em) : '—';
  document.getElementById('kpi-valor').textContent  = brl(total);
}

function renderTable() {
  const searchForn   = (document.getElementById('search-forn')?.value||'').toLowerCase();
  const searchNumero = (document.getElementById('search-numero')?.value||'').replace(/\D/g,'');

  const filtered = allData.filter(n => {
    if(searchForn   && !(n.nome_emitente||'').toLowerCase().includes(searchForn)) return false;
    if(searchNumero && !(n.numero||'').replace(/\D/g,'').includes(searchNumero)) return false;
    return true;
  });

  const tbody = document.getElementById('tbody-main');
  if(!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">Nenhuma NF-e processada encontrada.</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(n => `<tr>
    <td>
      <div style="font-weight:600">${esc(n.numero||'—')}</div>
      <div style="font-size:10px;color:#94a3b8;font-family:'DM Mono',monospace">${(n.chave_acesso||'').substring(0,20)}${n.chave_acesso?'…':''}</div>
    </td>
    <td>
      <div>${fmtDateShort(n.data_emissao)}</div>
      <div style="font-size:10px;color:#94a3b8">${n.serie||'1'}</div>
    </td>
    <td style="font-size:12px">${fmtDate(n.processada_em)}</td>
    <td>
      <div style="font-weight:500">${esc(n.nome_emitente||'—')}</div>
      <div style="font-size:10px;color:#94a3b8;font-family:'DM Mono',monospace">${n.cnpj_emitente||''}</div>
    </td>
    <td class="r" style="font-weight:600;font-family:'DM Mono',monospace">${brl(n.valor_total)}</td>
    <td class="c">
      <span class="badge-proc">
        <span style="width:6px;height:6px;border-radius:50%;background:#16a34a;display:inline-block"></span>
        Processada
      </span>
    </td>
  </tr>`).join('');
}

loadAll();
</script>
</body>
</html>
