<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · Aiko Sistema</title>

<style>
  :root{
    --bg1:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;
    --border:#e2e8f0;
    --red:#dc2626;--red2:#b91c1c;--red-dim:rgba(220,38,38,.12);
    --text1:#0f172a;--text2:#64748b;--text3:#94a3b8;
    --radius:10px;--radius-lg:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0a1628 0%, #0d2145 40%, #1a3a6e 70%, #7a9ab5 100%);
    color:var(--text1);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
    position:relative;
    overflow:hidden;
  }
  #bg-canvas{position:fixed;inset:0;z-index:0;width:100%;height:100%;}
  .card{position:relative;z-index:1;box-shadow:0 20px 60px rgba(0,0,0,.5);}

  /* ── CARD ── */
  .card{
    width:100%;
    max-width:400px;
    background:rgba(10,22,40,.75);
    border:1px solid rgba(100,180,255,.15);
    border-radius:var(--radius-lg);
    padding:40px 36px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
  }

  /* ── LOGO ── */
  .logo{text-align:center;margin-bottom:32px}
  .logo-mark{font-size:36px;font-weight:700;color:#f0f6ff;letter-spacing:-.5px}
  .logo-sub{
    font-size:12px;
    color:var(--red);
    font-family:'DM Mono',monospace;
    margin-top:4px;
    letter-spacing:.08em;
  }

  /* ── TÍTULOS ── */
  .card-title{font-size:18px;font-weight:700;margin-bottom:6px;color:#f0f6ff}
  .card-sub{font-size:13px;color:#94b4d4;margin-bottom:28px}

  /* ── FORM ── */
  .form-group{margin-bottom:16px}
  .form-group label{
    display:block;
    font-size:11px;
    font-weight:600;
    color:#7aa8cc;
    text-transform:uppercase;
    letter-spacing:.06em;
    margin-bottom:6px;
  }
  .form-group input{
    width:100%;
    background:rgba(255,255,255,.07);
    border:1px solid rgba(100,180,255,.2);
    color:#f0f6ff;
    padding:10px 14px;
    border-radius:var(--radius);
    font-size:14px;
    outline:none;
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    transition:border-color .15s;
  }
  .form-group input::placeholder{color:rgba(148,180,212,.5)}
  .form-group input:focus{border-color:rgba(100,180,255,.6);background:rgba(255,255,255,.1)}

  /* ── BOTÃO PRINCIPAL ── */
  .btn-primary{
    width:100%;
    background:var(--red);
    color:#fff;
    border:none;
    border-radius:var(--radius);
    padding:11px;
    font-size:14px;
    font-weight:600;
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    cursor:pointer;
    transition:background .15s;
    margin-top:8px;
  }
  .btn-primary:hover{background:var(--red2)}
  .btn-primary:disabled{opacity:.6;cursor:not-allowed}

  /* ── LINK ESQUECI SENHA ── */
  .link-forgot{
    display:block;
    text-align:center;
    margin-top:18px;
    font-size:13px;
    color:#7aa8cc;
    cursor:pointer;
    transition:color .15s;
    text-decoration:none;
    background:none;
    border:none;
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  .link-forgot:hover{color:#f0f6ff}

  /* ── BOTÃO VOLTAR ── */
  .btn-ghost{
    width:100%;
    background:transparent;
    color:var(--text2);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:11px;
    font-size:14px;
    font-weight:500;
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    cursor:pointer;
    transition:all .15s;
    margin-top:8px;
  }
  .btn-ghost:hover{color:var(--text1);border-color:var(--text2)}

  /* ── ALERTA ── */
  .alert{
    padding:10px 14px;
    border-radius:var(--radius);
    font-size:13px;
    margin-bottom:16px;
    display:none;
  }
  .alert.err{background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.35);color:#fca5a5}
  .alert.ok{background:rgba(34,197,94,.10);border:1px solid rgba(34,197,94,.30);color:#86efac}
  .alert.show{display:block}

  /* ── SEPARADOR ── */
  .divider{height:1px;background:var(--border);margin:24px 0}
</style>
<script src="utils.js"></script>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="card">
  <div class="logo">
    <div class="logo-mark">Aiko</div>
    <div class="logo-sub">sistema</div>
  </div>

  <!-- PAINEL LOGIN -->
  <div id="panel-login">
    <div class="card-title">Entrar</div>
    <div class="card-sub">Acesse sua conta para continuar</div>

    <div id="alert-login" class="alert"></div>

    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')entrar()">
    </div>

    <button class="btn-primary" id="btn-entrar" onclick="entrar()">Entrar</button>
    <button class="link-forgot" onclick="mostrarReset()">Esqueci a senha</button>
  </div>

  <!-- PAINEL RESET -->
  <div id="panel-reset" style="display:none">
    <div class="card-title">Recuperar senha</div>
    <div class="card-sub">Enviaremos um link para o seu e-mail</div>

    <div id="alert-reset" class="alert"></div>

    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="reset-email" placeholder="seu@email.com" autocomplete="email"
        onkeydown="if(event.key==='Enter')enviarReset()">
    </div>

    <button class="btn-primary" id="btn-reset" onclick="enviarReset()">Enviar link</button>
    <button class="btn-ghost" onclick="mostrarLogin()">← Voltar ao login</button>
  </div>

  <!-- PAINEL NOVA SENHA -->
  <div id="panel-nova-senha" style="display:none">
    <div class="card-title">Nova senha</div>
    <div class="card-sub">Digite sua nova senha</div>

    <div id="alert-nova-senha" class="alert"></div>

    <div class="form-group">
      <label>Nova senha</label>
      <input type="password" id="nova-senha" placeholder="••••••••" autocomplete="new-password"
        onkeydown="if(event.key==='Enter')salvarNovaSenha()">
    </div>
    <div class="form-group">
      <label>Confirmar senha</label>
      <input type="password" id="nova-senha-confirm" placeholder="••••••••" autocomplete="new-password"
        onkeydown="if(event.key==='Enter')salvarNovaSenha()">
    </div>

    <button class="btn-primary" id="btn-nova-senha" onclick="salvarNovaSenha()">Salvar nova senha</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://trczpnjidqfippbfxtpe.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyY3pwbmppZHFmaXBwYmZ4dHBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NzkyMTEsImV4cCI6MjA5MzM1NTIxMX0.9EGIFYLs9OYQO5aKUR3Ky7J_m3Hgdrys0lwmHkA-No8';
const SUPA_ANON = 'sb_publishable_GJqQ_qWVg5Y8GWaKy1qe7w_VvZiIQ3i';
const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);
const sbAuth = createClient(SUPA_URL, SUPA_KEY); // usa a mesma chave anon (JWT) do resto do app

function showAlert(panelId, msg, tipo) {
  const el = document.getElementById('alert-' + panelId);
  el.textContent = msg;
  el.className = 'alert ' + tipo + ' show';
}

function hideAlert(panelId) {
  document.getElementById('alert-' + panelId).className = 'alert';
}

function mostrarReset() {
  document.getElementById('panel-login').style.display = 'none';
  document.getElementById('panel-reset').style.display = '';
  const email = document.getElementById('login-email').value;
  if (email) document.getElementById('reset-email').value = email;
  hideAlert('reset');
}

function mostrarLogin() {
  document.getElementById('panel-reset').style.display = 'none';
  document.getElementById('panel-login').style.display = '';
  hideAlert('login');
}

async function entrar() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  if (!email || !senha) { showAlert('login', 'Preencha e-mail e senha.', 'err'); return; }

  const btn = document.getElementById('btn-entrar');
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  hideAlert('login');

  try {
    const { data, error } = await sbAuth.auth.signInWithPassword({ email, password: senha });
    if (error) throw new Error(error.message);
    localStorage.setItem('sb_token', data.session?.access_token || '');
    localStorage.setItem('sb_refresh_token', data.session?.refresh_token || '');
    localStorage.setItem('sb_user_id', data.user?.id || '');

    // Busca perfil do usuário
    const perfRes = await fetch(`${SUPA_URL}/rest/v1/usuarios?id=eq.${data.user?.id}&limit=1`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + (data.session?.access_token || SUPA_KEY) }
    });
    const perfil = perfRes.ok ? await perfRes.json() : [];
    if (perfil.length) {
      localStorage.setItem('sb_user', JSON.stringify(perfil[0]));
      localStorage.setItem('sb_tenant_id', perfil[0].tenant_id || '00000000-0000-0000-0000-000000000001');
      if (perfil[0].perfil === 'gerente') {
        window.location.href = 'loja.html';
        return;
      }
    }
    window.location.href = 'dashboard.html';
  } catch (e) {
    showAlert('login', e.message, 'err');
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

async function enviarReset() {
  const email = document.getElementById('reset-email').value.trim();
  if (!email) { showAlert('reset', 'Informe seu e-mail.', 'err'); return; }

  const btn = document.getElementById('btn-reset');
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  hideAlert('reset');

  try {
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html',
    });
    if (error) throw error;
    showAlert('reset', 'Link enviado! Verifique sua caixa de entrada.', 'ok');
  } catch (e) {
    showAlert('reset', e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Enviar link';
  }
}

async function salvarNovaSenha() {
  const senha = document.getElementById('nova-senha').value;
  const confirm = document.getElementById('nova-senha-confirm').value;
  if (!senha) { showAlert('nova-senha', 'Digite a nova senha.', 'err'); return; }
  if (senha !== confirm) { showAlert('nova-senha', 'As senhas não coincidem.', 'err'); return; }
  if (senha.length < 6) { showAlert('nova-senha', 'Senha deve ter ao menos 6 caracteres.', 'err'); return; }

  const btn = document.getElementById('btn-nova-senha');
  btn.disabled = true;
  btn.textContent = 'Salvando...';

  try {
    const { error } = await sbAuth.auth.updateUser({ password: senha });
    if (error) throw error;
    showAlert('nova-senha', 'Senha alterada! Redirecionando...', 'ok');
    setTimeout(() => window.location.href = 'login.html', 2000);
  } catch (e) {
    showAlert('nova-senha', e.message, 'err');
    btn.disabled = false;
    btn.textContent = 'Salvar nova senha';
  }
}

// Detecta token de recuperação na URL
(function() {
  const hash = window.location.hash;
  if (hash.includes('type=recovery')) {
    document.getElementById('panel-login').style.display = 'none';
    document.getElementById('panel-nova-senha').style.display = '';
  }
})();
</script>
<script>
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, pts;
  const N = 80, CONN = 140, SPEED = 0.3;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initPts(){
    pts = Array.from({length:N}, ()=>({
      x: Math.random()*W, y: Math.random()*H,
      vx:(Math.random()-.5)*SPEED, vy:(Math.random()-.5)*SPEED,
      r: Math.random()*2+1
    }));
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // linhas
    for(let i=0;i<N;i++){
      for(let j=i+1;j<N;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<CONN){
          const alpha=(1-d/CONN)*0.35;
          ctx.beginPath();
          ctx.strokeStyle=`rgba(100,180,255,${alpha})`;
          ctx.lineWidth=0.6;
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          ctx.stroke();
        }
      }
    }
    // pontos
    pts.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(120,200,255,0.7)';
      ctx.fill();
      // glow
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r*2.5,0,Math.PI*2);
      ctx.fillStyle='rgba(80,160,255,0.12)';
      ctx.fill();
    });
    // move
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize',()=>{resize();initPts();});
  resize(); initPts(); draw();
})();
</script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

</body>
</html>
