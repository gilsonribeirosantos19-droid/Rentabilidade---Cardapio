<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Protótipo — Sidebar 2 níveis (módulos + seções)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,'Segoe UI',sans-serif;background:#eef1f4;color:#1e293b;font-size:14px;display:flex;height:100vh;overflow:hidden}

  /* ───── COL 1: MÓDULOS (rail de ícones) ───── */
  .mods{width:74px;background:#161d2b;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:2px;overflow-y:auto;z-index:31}
  .mods::-webkit-scrollbar{width:0}
  .mlogo{width:42px;height:42px;background:#f97316;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;flex:none;box-shadow:0 2px 10px rgba(249,115,22,.4)}
  .mod{width:60px;padding:9px 4px;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;color:rgba(255,255,255,.6);text-align:center}
  .mod:hover{background:rgba(255,255,255,.07);color:#fff}
  .mod.on{background:rgba(249,115,22,.18);color:#f97316}
  .mod svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.9}
  .mod .l{font-size:9.5px;font-weight:600;line-height:1.1}

  /* ───── COL 2: SEÇÕES do módulo ───── */
  .secs{width:194px;background:#1e293b;flex-shrink:0;display:flex;flex-direction:column;padding:14px 0;z-index:30;overflow-y:auto}
  .secs::-webkit-scrollbar{width:6px}.secs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}
  .secs-h{padding:4px 18px 14px;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:8px}
  .secs-h b{font-size:17px;font-weight:800;color:#f1f5f9}
  .secs-h small{display:block;font-size:11px;color:#f97316;font-weight:600;margin-top:1px}
  .sec{display:flex;align-items:center;gap:11px;padding:10px 16px;border-radius:9px;margin:1px 10px;cursor:pointer;color:rgba(255,255,255,.74);position:relative}
  .sec:hover{background:rgba(255,255,255,.07);color:#fff}
  .sec.on{background:rgba(249,115,22,.16);color:#f97316}
  .sec svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.9;flex:none}
  .sec .l{font-size:13px;font-weight:500;white-space:nowrap}
  .sec .ch{margin-left:auto;font-size:13px;color:#f97316;font-weight:800}

  /* ───── FLYOUT (3º nível: itens da seção) ───── */
  .fly{position:fixed;width:244px;background:#1f2937;border-radius:13px;box-shadow:0 16px 46px rgba(0,0,0,.42);padding:15px;opacity:0;transform:translateX(-8px);pointer-events:none;transition:opacity .15s, transform .15s;z-index:60}
  .fly.open{opacity:1;transform:translateX(0);pointer-events:auto}
  .fly-head{display:flex;gap:12px;align-items:flex-start;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:9px}
  .fly-ic{width:42px;height:42px;border-radius:11px;background:#f97316;display:flex;align-items:center;justify-content:center;flex:none}
  .fly-ic svg{width:21px;height:21px;stroke:#fff;fill:none;stroke-width:2}
  .fly-t{font-size:15px;font-weight:800;color:#fff}.fly-d{font-size:12px;color:#94a3b8;margin-top:3px;line-height:1.4}
  .fly-i{display:flex;align-items:center;justify-content:space-between;padding:10px 11px;border-radius:9px;cursor:pointer;color:#cbd5e1;font-size:13px;font-weight:500}
  .fly-i:hover{background:rgba(249,115,22,.15);color:#f97316}.fly-i .ar{color:#64748b}

  /* ───── WORKSPACE ───── */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden}
  .tb{height:58px;background:#fff;border-bottom:1px solid #e7ebf0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
  .tb-title{font-size:20px;font-weight:800;color:#0f172a}
  .tb-r{display:flex;align-items:center;gap:12px;font-size:13px;color:#475569}
  .tb-r select{height:34px;border:1px solid #d3dae3;border-radius:8px;padding:0 8px;font-family:inherit;font-size:13px}
  .ws-tabs{display:flex;align-items:flex-end;gap:3px;padding:8px 16px 0;background:#eef1f4;flex-shrink:0;overflow-x:auto}
  .ws-tab{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;font-size:13px;font-weight:600;color:#64748b;background:#e2e8f0;border:1px solid #d8dee8;border-bottom:none;border-radius:8px 8px 0 0;cursor:pointer;white-space:nowrap}
  .ws-tab.active{background:#fff;color:#0f172a;border-bottom:2px solid #f97316;margin-bottom:-1px}
  .ws-tab .x{color:#94a3b8;font-size:15px;line-height:1}
  .ws-body{flex:1;overflow-y:auto;background:#fff;padding:24px;border-top:1px solid #e7ebf0}
  .note2{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:12.5px;padding:9px 13px;border-radius:9px;margin-bottom:16px;line-height:1.5;max-width:760px}
  .scr-h{font-size:18px;font-weight:800;color:#0f172a}.scr-d{font-size:13px;color:#64748b;margin:4px 0 16px}
  .scr-tool{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .scr-tool .f{height:36px;border:1px solid #d3dae3;border-radius:8px;background:#fff;padding:0 12px;font-size:12.5px;color:#64748b;display:flex;align-items:center}
  .scr-tbl{border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;max-width:720px}
  .scr-tbl .r{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;font-size:12.5px}
  .scr-tbl .r.head{background:#f1f5f9;color:#475569;font-weight:700}
  .scr-tbl .r>div{padding:9px 12px;border-bottom:1px solid #eef1f5}
  .flash{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;font-size:12.5px;font-weight:600;padding:9px 16px;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;transition:opacity .2s;pointer-events:none;z-index:99}
  .flash.on{opacity:1}
</style>
</head>
<body>
  <nav class="mods" id="mods"></nav>
  <nav class="secs" id="secs"></nav>
  <div class="fly" id="fly"></div>

  <div class="main">
    <div class="tb"><div class="tb-title" id="tbTitle">Estoque</div><div class="tb-r"><select><option>Todas as lojas</option></select><span>Djalma Leite Pinheiro Neto</span></div></div>
    <div class="ws-tabs" id="wsTabs"></div>
    <div class="ws-body" id="wsBody"></div>
  </div>
  <div class="flash" id="flash">⚡ aberto sem recarregar</div>

  <script>
    const I = {
      box:'<svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4z"/><polyline points="3.3 7 12 12 20.7 7"/></svg>',
      cart:'<svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>',
      file:'<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
      db:'<svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>',
      chart:'<svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
      chef:'<svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>',
      gear:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
      home:'<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
      down:'<svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4z"/></svg>',
      eye:'<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
      cal:'<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
      sliders:'<svg viewBox="0 0 24 24"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>',
      doc:'<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'
    };

    // ── módulos (col 1) e suas seções (col 2) ──
    const MODULES = [
      {n:'Estoque', ic:I.box, sec:[
        {n:'Visão Geral', ic:I.home, go:'__home'},
        {n:'Lançamentos', ic:I.down, desc:'Registre entradas, saídas e movimentações de estoque.', sub:['Entradas','Saídas','Inventário']},
        {n:'Consultas', ic:I.eye, desc:'Consulte posição, movimento e histórico do estoque.', sub:['Saldo de Estoque','Movimentação','Kardex']},
        {n:'Relatórios', ic:I.doc, desc:'Extratos e listagens de estoque por período.', sub:['Histórico de Entradas','Consumo de Insumos','Histórico de Custos']},
        {n:'Análises', ic:I.chart, desc:'Análises estratégicas para apoiar a decisão.', sub:['Curva ABC','Inflação','Resumo']},
        {n:'Fechamento', ic:I.cal, go:'Fechamento'},
        {n:'Ajustes', ic:I.sliders, go:'Ajustes'}
      ]},
      {n:'Compras', ic:I.cart, sec:[{n:'Sugestão de Compras', ic:I.cart, go:'Sugestão de Compras'},{n:'Pedidos de Compra', ic:I.doc, go:'Pedidos de Compra'}]},
      {n:'Fiscal', ic:I.file, sec:[{n:'Monitor NF-e', ic:I.file, go:'Monitor NF-e'},{n:'Entradas Processadas', ic:I.doc, go:'Entradas Processadas'},{n:'Auditoria de Conversão', ic:I.sliders, go:'Auditoria de Conversão'}]},
      {n:'Cadastros', ic:I.db, sec:[{n:'Insumos', ic:I.box, go:'Insumos'},{n:'Produtos', ic:I.box, go:'Produtos'},{n:'Fichas Técnicas', ic:I.doc, go:'Fichas Técnicas'},{n:'Fornecedores', ic:I.cart, go:'Fornecedores'}]},
      {n:'Gestão', ic:I.chart, sec:[{n:'CMV Teórico × Real', ic:I.chart, go:'CMV'},{n:'Rendimentos', ic:I.chart, go:'Rendimentos'},{n:'Divergências', ic:I.eye, go:'Divergências'},{n:'Fechamento de Custo', ic:I.cal, go:'Fechamento de Custo'}]},
      {n:'PDV', ic:I.cart, sec:[{n:'Dashboard', ic:I.chart, go:'PDV Dashboard'},{n:'Relatórios', ic:I.doc, go:'PDV Relatórios'},{n:'Importar / API', ic:I.box, go:'Importar / API'}]},
      {n:'Produção', ic:I.chef, sec:[{n:'Produção', ic:I.chef, go:'Produção'},{n:'Porcionamento', ic:I.sliders, go:'Porcionamento'}]},
      {n:'Config', ic:I.gear, sec:[{n:'Geral', ic:I.gear, go:'Geral'},{n:'Usuários', ic:I.db, go:'Usuários'},{n:'Permissões', ic:I.file, go:'Permissões'},{n:'Parâmetros', ic:I.sliders, go:'Parâmetros'}]}
    ];

    let activeMod = 'Estoque', flyOpen=null, openTabs=[], active='__home';
    const fly=document.getElementById('fly');

    function renderMods(){
      document.getElementById('mods').innerHTML =
        `<div class="mlogo"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"><polyline points="1,21 8,6 13,13 17,8 23,21"/><line x1="1" y1="21" x2="23" y2="21"/></svg></div>`+
        MODULES.map(m=>`<div class="mod${m.n===activeMod?' on':''}" onclick="selMod('${m.n}')">${m.ic}<span class="l">${m.n}</span></div>`).join('');
    }
    function renderSecs(){
      const m=MODULES.find(x=>x.n===activeMod);
      document.getElementById('secs').innerHTML =
        `<div class="secs-h"><b>${m.n}</b><small>módulo</small></div>`+
        m.sec.map(s=>`<div class="sec" data-s="${s.n}" onclick="secClick('${s.n}',this)">${s.ic}<span class="l">${s.n}</span>${s.sub?'<span class="ch">›</span>':''}</div>`).join('');
    }
    function selMod(n){ activeMod=n; closeFly(); renderMods(); renderSecs(); document.getElementById('tbTitle').textContent=n; }

    function secClick(name, el){
      const m=MODULES.find(x=>x.n===activeMod), s=m.sec.find(x=>x.n===name);
      if(s.sub){ openFly(s, el); }
      else { closeFly(); document.querySelectorAll('.sec').forEach(e=>e.classList.toggle('on', e.dataset.s===name)); if(s.go==='__home') goHome(); else openScreen(s.go); }
    }
    function openFly(s, el){
      if(flyOpen===s.n){ closeFly(); return; }
      flyOpen=s.n;
      fly.innerHTML=`<div class="fly-head"><div class="fly-ic">${s.ic}</div><div><div class="fly-t">${s.n}</div><div class="fly-d">${s.desc}</div></div></div>`+
        s.sub.map(i=>`<div class="fly-i" onclick="pick(event,'${i}')"><span>${i}</span><span class="ar">›</span></div>`).join('');
      const r=el.getBoundingClientRect();
      let top=r.top; const h=72+s.sub.length*42; if(top+h>window.innerHeight-12) top=window.innerHeight-h-12;
      fly.style.top=Math.max(12,top)+'px'; fly.style.left=(r.right+10)+'px';
      fly.classList.add('open');
      document.querySelectorAll('.sec').forEach(e=>e.classList.toggle('on', e.dataset.s===s.n));
    }
    function closeFly(){ flyOpen=null; fly.classList.remove('open'); }
    function pick(ev,item){ if(ev) ev.stopPropagation(); closeFly(); openScreen(item); }
    document.addEventListener('click', e=>{ if(!e.target.closest('.secs') && !e.target.closest('.fly')) closeFly(); });

    function flash(){ const f=document.getElementById('flash'); f.classList.add('on'); clearTimeout(window._ft); window._ft=setTimeout(()=>f.classList.remove('on'),1100); }
    function openScreen(label){ const isNew=!openTabs.find(t=>t.key===label); if(isNew) openTabs.push({key:label,label}); active=label; if(isNew) flash(); render(); }
    function closeTab(key,ev){ ev.stopPropagation(); openTabs=openTabs.filter(t=>t.key!==key); if(active===key) active=openTabs.length?openTabs[openTabs.length-1].key:'__home'; render(); }
    function goHome(){ active='__home'; render(); }
    function render(){
      let h=`<div class="ws-tab home${active==='__home'?' active':''}" onclick="goHome()" title="Início">🏠</div>`;
      h+=openTabs.map(t=>`<div class="ws-tab${active===t.key?' active':''}" onclick="openScreen('${t.label}')">${t.label} <span class="x" onclick="closeTab('${t.key}',event)">×</span></div>`).join('');
      document.getElementById('wsTabs').innerHTML=h;
      const b=document.getElementById('wsBody');
      if(active==='__home'){ b.innerHTML=`<div class="note2">🧭 <b>Sidebar de 2 níveis:</b> a coluna fininha à esquerda = <b>MÓDULOS</b> (Estoque, Compras, Fiscal…). A do lado = as <b>SEÇÕES</b> do módulo escolhido. Troque de módulo na 1ª coluna e veja a 2ª mudar. Em <b>Estoque ▸ Lançamentos</b> abre o card (3º nível).</div><div class="scr-h">${activeMod} · visão geral</div><div class="scr-d">Selecione uma seção no menu.</div>`; return; }
      b.innerHTML=`<div class="scr-h">${active}</div><div class="scr-d">Tela de exemplo — abriu como aba, sem recarregar.</div>
        <div class="scr-tool"><div class="f">Período: Mês atual</div><div class="f">Loja: Todas</div><div class="f">🔍 Buscar…</div></div>
        <div class="scr-tbl"><div class="r head"><div>Insumo</div><div>Un.</div><div>Qtd</div><div>Valor</div></div>
          <div class="r"><div>Salmão Fresco</div><div>kg</div><div>12,500</div><div>R$ 1.250,00</div></div>
          <div class="r"><div>Arroz Japonês</div><div>kg</div><div>30,000</div><div>R$ 210,00</div></div>
          <div class="r"><div>Cream Cheese</div><div>kg</div><div>8,200</div><div>R$ 410,00</div></div>
        </div>`;
    }
    renderMods(); renderSecs(); render();
  </script>
</body>
</html>
